<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFeed AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-theme="deep-focus">
  <main class="popup-shell">
    <header class="popup-header">
      <div class="header-copy">
        <p class="eyebrow">SmartFeed AI</p>
        <h1>Shape your feed around what matters.</h1>
      </div>

      <label class="theme-toggle" for="theme-toggle-input" aria-label="Switch between Deep Focus and Zen Space themes">
        <input id="theme-toggle-input" class="theme-toggle-input" type="checkbox">
        <span class="theme-toggle-track">
          <span class="theme-toggle-label theme-toggle-label-dark">Deep Focus</span>
          <span class="theme-toggle-label theme-toggle-label-light">Zen Space</span>
          <span class="theme-toggle-thumb" aria-hidden="true"></span>
        </span>
      </label>
    </header>

    <section class="panel" aria-labelledby="preferences-heading">
      <div class="section-heading">
        <div>
          <h2 id="preferences-heading">Your feed</h2>
          <p>Choose the topics you want the AI to match semantically.</p>
        </div>
        <button id="add-topic-btn" class="ghost-button" type="button">Add topic</button>
      </div>

      <div id="topics-container" class="topics-list" aria-label="Interest preference list"></div>

      <template id="topic-row-template">
        <div class="topic-row">
          <label class="topic-field">
            <span class="field-label">Topic</span>
            <input type="text" class="topic-name" placeholder="Programming, UPSC, Football">
          </label>

          <button class="icon-button remove-topic-btn" type="button" aria-label="Remove topic">Remove</button>
        </div>
      </template>

      <div id="status" class="status-message" role="status" aria-live="polite"></div>

      <button id="save-btn" class="primary-button" type="button">Save preferences</button>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
